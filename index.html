<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akash & Pranshi | Wedding Invitation</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <div class="hero-panel">
      <div class="hero-glow"></div>
      <div class="hero-content">
        <div class="hero-image-wrapper">
          <img id="coupleImage" src="./couple.jpg" alt="Akash & Pranshi" class="couple-image" />
        </div>
        <div class="hero-copy">
          <p class="eyebrow">A wedding invitation with a surprise</p>
          <h1>Akash & Pranshi</h1>
          <button id="startButton" class="primary-btn">Open the invitation</button>
        </div>
      </div>
    </div>

    <section class="stage stage-hidden" id="gameStage">
      <div class="stage-header">
        <h2>Pop the bubbles</h2>
        <p>Pop 8 bubbles before time runs out to unlock the invitation.</p>
      </div>
      <div class="game-board" id="gameBoard"></div>
      <div class="status-bar">
        <div id="score">0 / 8 bubbles</div>
        <div id="countdown">20 sec</div>
      </div>
      <button id="resetButton" class="secondary-btn">Reset game</button>
    </section>

    <section class="stage stage-hidden" id="inviteStage">
      <div class="invite-card">
        <div class="invite-header">
          <span>You're invited</span>
          <h2>Akash & Pranshi</h2>
        </div>
        <p class="invite-line">Join us for a joyful celebration at</p>
        <p class="invite-detail">HB Klyde Moradabad</p>
        <p class="invite-line">on</p>
        <p class="invite-detail">20 November 2026</p>
        <div class="invite-cta">
          <button id="replayButton" class="primary-btn">Play again</button>
          <a href="#" class="ghost-btn">Save the date</a>
        </div>
      </div>
    </section>
  </div>

  <canvas id="confettiCanvas"></canvas>

  <audio id="bgMusic" loop volume="0.3">
    <source src="./bg-music.mp3" type="audio/mpeg" />
  </audio>

  <script src="script.js"></script>
</body>
</html>
